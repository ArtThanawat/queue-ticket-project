<p-dialog
  [visible]="state().visible"
  (visibleChange)="onVisibleChange($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [dismissableMask]="true"
  [header]="state().header"
  styleClass="app-confirm-dialog w-[min(92vw,28rem)] overflow-hidden bg-white"
  contentStyleClass="bg-white text-slate-700"
  headerStyleClass="bg-white"
  maskStyleClass="backdrop-blur-sm"
>
  <div class="space-y-5 bg-white">
    <p class="text-sm leading-6 text-slate-600">{{ state().message }}</p>

    <div class="flex flex-col-reverse gap-2 sm:flex-row sm:justify-end">
      <button
        pButton
        type="button"
        class="bg-white border-slate-300 text-slate-700 hover:bg-slate-50"
        [outlined]="true"
        [label]="state().rejectLabel"
        (click)="onReject()"
      ></button>

      <button
        pButton
        type="button"
        [severity]="state().acceptSeverity"
        [label]="state().acceptLabel"
        (click)="onAccept()"
      ></button>
    </div>
  </div>
</p-dialog>
