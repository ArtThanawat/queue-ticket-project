<div class="flex min-h-screen flex-col bg-slate-50">
  <div class="app-content flex flex-1 flex-col">
    <ng-content />
  </div>

  <footer class="border-t border-slate-200 bg-white px-4 py-3 text-end text-xs text-slate-500">
    <span class="font-medium text-slate-600">{{ appConfig.appName }}</span>
    <span class="mx-2 text-slate-300">|</span>
    <span>Version {{ appConfig.appVersion }}</span>
    <span class="mx-2 text-slate-300">|</span>
    <span>Build {{ appConfig.buildVersion }}</span>
    @if (!appConfig.production) {
      <span class="mx-2 text-slate-300">|</span>
      <span>{{ appConfig.name }}</span>
    }
  </footer>
</div>
