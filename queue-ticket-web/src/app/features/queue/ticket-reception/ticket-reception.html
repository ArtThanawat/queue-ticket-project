<app-queue-frame class="flex flex-1 flex-col" code="IT 05-1">
  <div class="space-y-2">
    <h1 class="text-2xl font-bold text-slate-900">รับบัตรคิว</h1>
    <p class="text-sm text-slate-500">กดปุ่มด้านล่างเพื่อรับลำดับคิว</p>
  </div>

  <button
    pButton
    type="button"
    class="w-full py-4 text-xl font-bold"
    [label]="loading() ? 'กำลังรับบัตรคิว...' : 'รับบัตรคิว'"
    [disabled]="loading()"
    (click)="createTicket()"
  ></button>

  <div class="flex justify-center mt-3">
    <div class="text-sm text-slate-400 hover:text-slate-600 cursor-pointer underline" (click)="goToResetQueue()">ล้างคิวระบบ</div>
  </div>
</app-queue-frame>
