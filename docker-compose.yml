services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-QueueTicket_dev#2026}"
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - queue-ticket-sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    build:
      context: ./queue-ticket-api
    environment:
      ASPNETCORE_ENVIRONMENT: Local
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=QueueTicketDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-QueueTicket_dev#2026};TrustServerCertificate=True;Encrypt=True;Connection Timeout=30"
      Cors__AllowedOrigins__0: "http://localhost:${WEB_PORT:-8080}"
    ports:
      - "${API_PORT:-5001}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  web:
    build:
      context: ./queue-ticket-web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  queue-ticket-sqlserver-data:
